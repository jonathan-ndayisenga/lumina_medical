{% extends "base.html" %}

{% block title %}Delete Report{% endblock %}

{% block extra_css %}
<style>
    .delete-card {
        max-width: 720px;
        margin: 0 auto;
        display: grid;
        gap: 1rem;
    }

    .delete-actions {
        margin-top: 1rem;
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
    }

    .delete-actions > * {
        flex: 1 1 220px;
    }

    @media (max-width: 520px) {
        .delete-actions > * {
            flex-basis: 100%;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="delete-card">
    <h2>Delete Lab Report</h2>
    <p>Are you sure you want to delete the report for <strong>{{ report.patient_name }}</strong> dated {{ report.sample_date }}?</p>
    <form method="post" class="no-print delete-actions">
        {% csrf_token %}
        <button type="submit" class="btn" style="background:#b91c1c;">Yes, delete</button>
        <a href="{% url 'report_detail' report.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
